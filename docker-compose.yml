services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: firstday
      POSTGRES_PASSWORD: firstday
      POSTGRES_DB: firstday_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com   
      PGADMIN_DEFAULT_PASSWORD: admin            
    ports:
      - "5050:80"                                 # Maps pgAdmin to localhost:5050
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres             # Connects backend to postgres service
      DB_PORT: 5432
      DB_USER: firstday
      DB_PASSWORD: firstday
      DB_NAME: firstday_db
      JWT_SECRET: your_jwt_secret_here
      TYPEORM_SYNC: "true"
      TYPEORM_LOGGING: "true"
    depends_on:
      - postgres                    # Ensures PostgreSQL starts before backend
    ports:
      - "3001:3000" # Map the backend to port 3001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000" # Map the frontend to port 3000
      
volumes:
  postgres_data: